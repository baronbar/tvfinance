<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dubai Market Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
<h1>Dubai Market Dashboard</h1>
<div id="datetime"></div>
</header>

<div class="grid">
<div class="card wide">
<script src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async></script>
<div id="ticker">Markets</div>
</div>

<div class="card"><h2>Crypto</h2><div id="crypto"></div></div>
<div class="card"><h2>World Clocks</h2><div id="clocks"></div></div>
<div class="card"><h2>Financial News</h2><div id="news">Loading...</div></div>
<div class="card"><h2>Dubai AQI</h2><iframe src="https://aqicn.org/city/uae/dubai/" class="frame"></iframe></div>
<div class="card"><h2>Gold Chart</h2><iframe src="https://www.tradingview.com/chart/" class="frame"></iframe></div>
</div>

<script src="script.js"></script>
</body>
</html>
