<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubai Trader Terminal</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Top Bar: Time & Dubai Environment -->
        <header class="top-bar panel">
            <div class="time-block">
                <span id="clock-time">00:00:00</span>
                <span id="clock-date">Mon, Jan 1</span>
            </div>
            <div class="dubai-layer">
                <div class="weather-item"><span class="label">DXB TEMP</span><span id="dxb-temp" class="value">--°C</span></div>
                <div class="weather-item"><span class="label">HUMIDITY</span><span id="dxb-hum" class="value">--%</span></div>
                <div class="weather-item"><span class="label">UV INDEX</span><span id="dxb-uv" class="value">--</span></div>
                <div class="weather-item"><span class="label">AQI</span><span id="dxb-aqi" class="value">--</span></div>
                <div class="weather-item"><span class="label">PM2.5</span><span id="dxb-pm25" class="value">--</span></div>
            </div>
            <div class="macro-indicators">
                <div class="fg-index"><span class="label">FEAR/GREED</span><span class="value neutral">NEUTRAL</span></div>
            </div>
        </header>

        <main class="main-grid">
            <!-- Left Rail: Portfolio Watchlist -->
            <aside class="portfolio-panel panel">
                <h2>CORE HOLDINGS</h2>
                <div class="tradingview-widget-container" style="height: 100%;">
                    <div class="tradingview-widget-container__widget" style="height: calc(100% - 40px);"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                    {
                        "colorTheme": "dark",
                        "dateRange": "12M",
                        "showChart": true,
                        "locale": "en",
                        "width": "100%",
                        "height": "100%",
                        "largeChartUrl": "",
                        "isTransparent": true,
                        "showSymbolLogo": true,
                        "showFloatingTooltip": false,
                        "tabs": [
                            {
                                "title": "Portfolio",
                                "symbols": [
                                    {"s": "NASDAQ:QQQM", "d": "Invesco QQQM"},
                                    {"s": "AMEX:VOO", "d": "Vanguard S&P 500"},
                                    {"s": "OANDA:XAUUSD", "d": "Gold"},
                                    {"s": "OANDA:XAGUSD", "d": "Silver"},
                                    {"s": "BINANCE:BTCUSD", "d": "Bitcoin"},
                                    {"s": "TVC:BRENT", "d": "Brent Oil"}
                                ]
                            },
                            {
                                "title": "Macro",
                                "symbols": [
                                    {"s": "CBOE:VIX", "d": "Volatility Index"},
                                    {"s": "TVC:DXY", "d": "US Dollar Index"},
                                    {"s": "TVC:US10Y", "d": "US 10Y Yield"},
                                    {"s": "CME_MINI:NQ1!", "d": "Nasdaq Futures"}
                                ]
                            }
                        ]
                    }
                    </script>
                </div>
            </aside>

            <!-- Center: Master Chart (Buying Opportunity Analysis) -->
            <section class="chart-panel panel">
                <div class="tradingview-widget-container">
                    <div id="tv_chart"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                    <script type="text/javascript">
                    new TradingView.widget({
                        "autosize": true,
                        "symbol": "NASDAQ:QQQM",
                        "interval": "D",
                        "timezone": "Asia/Dubai",
                        "theme": "dark",
                        "style": "1",
                        "locale": "en",
                        "enable_publishing": false,
                        "backgroundColor": "#121212",
                        "gridColor": "#1f1f1f",
                        "hide_top_toolbar": true,
                        "hide_legend": false,
                        "save_image": false,
                        "container_id": "tv_chart",
                        "studies": [
                            "RSI@tv-basicstudies",
                            "MACD@tv-basicstudies"
                        ]
                    });
                    </script>
                </div>
            </section>

            <!-- Right Rail: Filtered News & Economic Calendar -->
            <aside class="right-rail">
                <div class="news-panel panel">
                    <h2>AI INTEL & MACRO NEWS</h2>
                    <ul id="news-list" class="news-list">
                        <!-- News items injected via JS -->
                    </ul>
                </div>
                <div class="calendar-panel panel">
                    <h2>ECONOMIC EVENTS</h2>
                    <div class="tradingview-widget-container">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                        {
                            "colorTheme": "dark",
                            "isTransparent": true,
                            "width": "100%",
                            "height": "100%",
                            "locale": "en",
                            "importanceFilter": "0,1",
                            "currencyFilter": "USD,EUR,GBP,CNY"
                        }
                        </script>
                    </div>
                </div>
            </aside>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
